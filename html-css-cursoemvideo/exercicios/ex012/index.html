<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo em HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>

    <video width="500" poster="imagens/capa.png" controls>
        <source src="midia/nature.ogv" type="video/ogg">
        <source src="midia/nature.mov" type="video/mov">
        <source src="midia/Nature.mp4" type="video/mp4">
        <source src="midia/Nature.webm" type="video/webm">
        <p>Navegador não compatível com os formatos de vídeo.</p>
    </video>

    <h1>Inserindo vídeos do YouTube</h1>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/JyGWkU2bPdg?si=hthpoA2wfvUp_bQg" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo vídeos do Vimio</h1>
    <div style="padding:56.25% 0 0 0;position:relative;"><iframe width="560" height="315" src="https://player.vimeo.com/video/284834103?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="Nature Valley - Nothing replaces nature"></iframe></div><script src="https://player.vimeo.com/api/player.js"></script>
    
</body>
</html>
