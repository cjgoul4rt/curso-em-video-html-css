<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linhas</h1>
    <hr>
    <p>É possível adicionar qualquer coisa dentros das tags de parágrafos.</p>

    <p>Caso queira quebrar o texto em algum lugar específico, <br> basta usar a tag &lt;br&gt;.</p> <!-- lt significa less than (menor que), gt significa greater than (maior que) -->

    <p>Símbolos especiais: &copy; &reg; &trade; &euro; &pound; &dollar; &real;</p>

    <p>Emojis:
        &#128512; &#128513; &#128514; &#128515; &#128516; &#128517; &#128518; &#128519; &#128520; &#128521;
    </p>

</body>
</html>
